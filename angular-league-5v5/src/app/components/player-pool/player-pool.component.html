<div class="max-w-5xl mx-auto mt-12">
  <h2 class="text-2xl font-bold text-white mb-6 text-center">Player Pool</h2>
  
  <div class="grid grid-cols-5 gap-4">
    <div *ngFor="let player of players; let i = index" 
      (click)="selectPlayer(i)"
      [class.border-indigo-400]="selectedIndex === i"
      [class.border-gray-600]="selectedIndex !== i"
      class="bg-white/5 rounded-lg p-4 border-2 hover:border-indigo-500 transition-colors cursor-pointer min-h-[80px] flex items-center justify-center">

      <!-- Popunjen slot -->
      <div *ngIf="player" class="text-center">
        <img 
          [src]="'https://ddragon.leagueoflegends.com/cdn/' + patchVersion + '/img/profileicon/' + player.summonerIconId + '.png'"
          [alt]="player.summonerName"
          class="w-12 h-12 rounded-full mx-auto mb-2 border-2 border-indigo-500"
        />
        <div class="text-white font-semibold mb-1">{{ player.summonerName }}</div>
        <div class="text-gray-400 text-sm">Lvl {{ player.summonerLevel }}</div>
      </div>

      <!-- Prazan slot -->
      <span *ngIf="!player" class="text-gray-600 text-sm">Empty</span>
    </div>
  </div>

  <!-- Buttons -->
  <div class="mt-8 text-center flex justify-center gap-4">
    <button 
      (click)="removePlayer()"
      [disabled]="selectedIndex === null || players[selectedIndex] === null"
      class="bg-red-600 hover:bg-red-700 disabled:opacity-40 disabled:cursor-not-allowed text-white font-semibold py-3 px-8 rounded-lg border border-red-500 transition-colors">
      Remove Player
    </button>
    <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-lg border border-indigo-500 transition-colors">
      Fair Play
    </button>
  </div>
</div>
