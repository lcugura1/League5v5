<div class="max-w-5xl mx-auto mt-12">
  <h2 class="text-2xl font-bold text-white mb-6 text-center">Player Pool</h2>
  <div class="grid grid-cols-5 gap-4">
    <div *ngFor="let player of players" class="bg-white/5 rounded-lg p-4 border border-gray-600 hover:border-indigo-500 transition-colors cursor-pointer">
      <div class="text-center">
        <div class="text-white font-semibold mb-1">{{ player.name }}</div>
        <div class="text-gray-400 text-sm">{{ player.role }}</div>
      </div>
    </div>
  </div>

  <div class="mt-8 text-center">
    <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-lg border border-indigo-500 transition-colors">
      Fair Play
    </button>
  </div>
</div>
