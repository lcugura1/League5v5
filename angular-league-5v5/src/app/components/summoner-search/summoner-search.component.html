<app-summoner-search-error *ngIf="error" class="error" [error]="error"></app-summoner-search-error>

<div class="max-w-md mx-auto">
  <label class="block text-sm/6 font-medium text-white">Summoner name</label>
  <div class="mt-2 flex gap-2">
    <div class="flex items-center rounded-md bg-white/5 pl-3 outline-1 -outline-offset-1 outline-gray-600 has-[input:focus-within]:outline-2 has-[input:focus-within]:-outline-offset-2 has-[input:focus-within]:outline-indigo-500 grow">
      <input 
        type="text" 
        [(ngModel)]="gameName"
        placeholder="Game name" 
        class="block min-w-0 grow bg-gray-800 py-1.5 pr-3 pl-1 text-base text-white placeholder:text-gray-500 focus:outline-none sm:text-sm/6">
    </div>

    <!-- Tag separator -->
    <span class="text-gray-400 self-center font-bold">#</span>

    <!-- Tag input -->
    <div class="flex items-center rounded-md bg-white/5 pl-3 outline-1 -outline-offset-1 outline-gray-600 has-[input:focus-within]:outline-2 has-[input:focus-within]:-outline-offset-2 has-[input:focus-within]:outline-indigo-500 w-24">
      <input 
        type="text" 
        [(ngModel)]="tagLine"
        placeholder="EUNE" 
        class="block min-w-0 grow bg-gray-800 py-1.5 pr-3 pl-1 text-base text-white placeholder:text-gray-500 focus:outline-none sm:text-sm/6">
    </div>

    <!-- Search button -->
    <button 
      (click)="onSearch()"
      [disabled]="isLoading"
      class="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-semibold py-1.5 px-4 rounded-lg transition-colors">
      {{ isLoading ? 'Searching...' : 'Search' }}
    </button>
  </div>

  <!-- Error message -->
  <!-- <p *ngIf="errorMessage" class="mt-2 text-red-400 text-sm">{{ errorMessage }}</p> -->
</div>
