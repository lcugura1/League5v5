<div *ngIf="team1.length > 0 || team2.length > 0" class="max-w-5xl mx-auto mt-12">
  <h2 class="text-2xl font-bold text-white mb-6 text-center">Teams</h2>

  <div class="grid grid-cols-2 gap-8">
    
    <!-- Team 1 -->
    <div>
      <h3 class="text-lg font-semibold text-indigo-400 mb-4 text-center">Team 1</h3>
      <div class="flex flex-col gap-3">
        <div *ngFor="let player of team1"
          class="bg-white/5 rounded-lg p-3 border border-gray-600 flex items-center gap-3">
          <img 
            [src]="'https://ddragon.leagueoflegends.com/cdn/' + patchVersion + '/img/profileicon/' + player.summonerIconId + '.png'"
            [alt]="player.summonerName"
            class="w-10 h-10 rounded-full border-2 border-indigo-500"
          />
          <div>
            <div class="text-white font-semibold">{{ player.summonerName }}</div>
            <div class="text-gray-400 text-sm">Lvl {{ player.summonerLevel }}</div>
          </div>
          <div class="ml-auto text-sm text-indigo-300">
            {{ player.tier || 'Unranked' }} {{ player.rank }}
          </div>
        </div>
      </div>
    </div>

    <!-- Team 2 -->
    <div>
      <h3 class="text-lg font-semibold text-red-400 mb-4 text-center">Team 2</h3>
      <div class="flex flex-col gap-3">
        <div *ngFor="let player of team2"
          class="bg-white/5 rounded-lg p-3 border border-gray-600 flex items-center gap-3">
          <img 
            [src]="'https://ddragon.leagueoflegends.com/cdn/' + patchVersion + '/img/profileicon/' + player.summonerIconId + '.png'"
            [alt]="player.summonerName"
            class="w-10 h-10 rounded-full border-2 border-red-500"
          />
          <div>
            <div class="text-white font-semibold">{{ player.summonerName }}</div>
            <div class="text-gray-400 text-sm">Lvl {{ player.summonerLevel }}</div>
          </div>
          <div class="ml-auto text-sm text-red-300">
            {{ player.tier || 'Unranked' }} {{ player.rank }}
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
