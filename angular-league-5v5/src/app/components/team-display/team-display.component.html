<div class="max-w-5xl mx-auto mt-12">
  <h2 class="text-2xl font-bold text-white mb-6 text-center">Teams</h2>

  <!-- Team 1 -->
  <div class="mb-6">
    <h3 class="text-lg font-semibold text-indigo-400 mb-3">Team 1</h3>
    <div class="grid grid-cols-5 gap-4">
      <div *ngFor="let slot of slots" class="bg-white/5 rounded-lg p-4 border border-indigo-600/50 min-h-[80px] flex items-center justify-center">
        <span class="text-gray-500 text-sm">Empty</span>
      </div>
    </div>
  </div>

  <!-- Team 2 -->
  <div>
    <h3 class="text-lg font-semibold text-red-400 mb-3">Team 2</h3>
    <div class="grid grid-cols-5 gap-4">
      <div *ngFor="let slot of slots" class="bg-white/5 rounded-lg p-4 border border-red-600/50 min-h-[80px] flex items-center justify-center">
        <span class="text-gray-500 text-sm">Empty</span>
      </div>
    </div>
  </div>
</div>
